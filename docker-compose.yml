
services:
  backend:
    build:
      context: .
      target: production
    env_file:
      - .env.example
    ports:
      - '8000:8000'
    command: ['node', 'backend/dist/index.js']
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      target: production
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    command: ['npm', 'run', 'start', '--prefix', 'frontend']
    depends_on:
      backend:
        condition: service_healthy
